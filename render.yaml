services:
  - type: web
    name: sql-second-opinion-slack
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      python -m gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4
      app.wsgi:application
    healthCheckPath: /health
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
